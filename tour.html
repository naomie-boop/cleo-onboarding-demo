<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleo Insight — Onboarding</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#1E1B8C;--brand-08:rgba(30,27,140,0.08);--brand-15:rgba(30,27,140,0.15);
  --cta:#1F2937;--cta-hover:#111827;
  --ink:#111827;--white:#FFFFFF;--surface:#FAFAFA;--card:#F3F4F6;
  --border:#E5E7EB;--t1:#111827;--t2:#6B7280;--t3:#9CA3AF;
  --green:#059669;--orange:#D97706;--red:#DC2626;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-pill:9999px;
  --shadow:0 4px 24px rgba(0,0,0,0.08),0 1px 8px rgba(0,0,0,0.04);
  --shadow-lg:0 12px 48px rgba(0,0,0,0.12),0 4px 16px rgba(0,0,0,0.06);
  --font:'Satoshi',-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:#0a0a12;color:var(--t1);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}

/* ═══ HOME ═══ */
.home{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;background:var(--white);transition:opacity .5s;overflow-y:auto}
.home.out{opacity:0;pointer-events:none}
.h-inner{max-width:880px;width:92%;padding:48px 0}
.h-head{text-align:center;margin-bottom:36px}
.h-logo{margin-bottom:24px}
.h-logo svg{height:32px}
.h-badge{display:inline-block;background:var(--white);color:var(--t2);font-size:12px;font-weight:500;padding:6px 16px;border-radius:var(--r-pill);margin-bottom:16px;border:1px solid var(--border)}
.h-head h1{color:var(--ink);font-size:2rem;font-weight:700;letter-spacing:-.03em;margin-bottom:8px;line-height:1.2}
.h-head p{color:var(--t2);font-size:15px;line-height:1.6;max-width:550px;margin:0 auto}
.h-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.h-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:22px 20px;cursor:pointer;transition:all .2s;position:relative}
.h-card:hover{border-color:var(--brand);box-shadow:var(--shadow);transform:translateY(-2px)}
.h-card.done{opacity:.4}.h-card.done::after{content:'✓';position:absolute;top:10px;right:12px;color:var(--green);font-size:16px;font-weight:700}
.h-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--card);color:var(--t3);font-size:11px;font-weight:700;margin-bottom:10px}
.h-card h3{color:var(--ink);font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.3}
.h-card p{color:var(--t2);font-size:12px;line-height:1.5}
.h-card .h-steps{display:inline-block;margin-top:8px;color:var(--t3);font-size:10px;font-weight:600;letter-spacing:.04em}

/* ═══ APP ═══ */
.app{display:none;height:100vh;width:100vw;flex-direction:column}
.app.on{display:flex}

.topbar{height:48px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
.topbar-back{background:none;border:1px solid var(--border);font-family:var(--font);font-size:12px;font-weight:500;color:var(--t1);cursor:pointer;padding:5px 12px;border-radius:var(--r-sm)}
.topbar-back:hover{background:var(--card)}
.topbar-logo{font-size:10px;font-weight:700;color:var(--brand);letter-spacing:.12em;text-transform:uppercase}
.topbar-title{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.topbar-dots{display:flex;gap:3px}
.t-dot{width:7px;height:7px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);transition:all .3s}
.t-dot.done{background:var(--brand);border-color:var(--brand)}
.t-dot.cur{border-color:var(--brand);box-shadow:0 0 0 3px rgba(30,27,140,.15)}
.topbar-count{font-size:11px;color:var(--t3);font-weight:600;min-width:40px;text-align:right}

.body{flex:1;display:flex;overflow:hidden}
.content{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#F9FAFB;overflow:hidden}
.content img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;box-shadow:var(--shadow);transition:opacity .3s}
.content img.fade{opacity:0}

/* Ring */
.ring{position:absolute;z-index:18;pointer-events:none;border:2.5px solid var(--brand);border-radius:var(--r-sm);animation:rp 2s infinite;transition:all .35s;display:none}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(30,27,140,.25)}50%{box-shadow:0 0 0 8px rgba(30,27,140,0)}}

/* Overlay dim */
.dim{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:15;pointer-events:none;transition:opacity .3s;opacity:0}
.dim.on{opacity:1}

/* Tooltip */
.tip{position:absolute;background:var(--white);border-radius:var(--r-lg);max-width:400px;box-shadow:var(--shadow-lg);z-index:50;display:none;overflow:hidden;border:1px solid var(--border)}
.tip.on{display:block}
.tip-head{background:var(--cta);padding:12px 18px;display:flex;align-items:center;gap:8px}
.tip-num{color:rgba(255,255,255,.45);font-size:10px;font-weight:700;letter-spacing:.06em}
.tip-label{color:#fff;font-size:12px;font-weight:600;flex:1}
.tip-body{padding:16px 18px 12px}
.tip h3{font-size:14px;font-weight:700;margin-bottom:5px;color:var(--t1);line-height:1.35}
.tip p{font-size:12.5px;color:var(--t2);line-height:1.65}
.tip-hl{background:rgba(30,27,140,.05);border-left:3px solid var(--brand);padding:8px 12px;border-radius:0 var(--r-sm) var(--r-sm) 0;margin-top:10px;font-size:11.5px;color:var(--t1);line-height:1.5;display:none}
.tip-nav{display:flex;gap:6px;padding:0 18px 14px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-p{background:var(--cta);color:#fff}.btn-p:hover{background:var(--cta-hover)}
.btn-g{background:none;color:var(--t3);padding:8px 10px}.btn-g:hover{color:var(--t1)}
.tip-mid{flex:1;font-size:10px;color:var(--t3);text-align:center}

/* Bottom */
.bottombar{height:46px;background:var(--white);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;z-index:100}
.bb-dots{display:flex;gap:4px}
.bb-d{width:5px;height:5px;border-radius:50%;background:var(--card);border:1px solid var(--border);transition:all .3s}
.bb-d.done{background:var(--green);border-color:var(--green)}.bb-d.cur{background:var(--brand);border-color:var(--brand)}
.bb-info{font-size:11px;color:var(--t2)}
.bb-info strong{color:var(--t1)}
.bb-keys{font-size:10px;color:var(--t3)}
.bb-keys kbd{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:var(--font);font-size:9px}

/* Final */
.final{position:fixed;inset:0;z-index:2000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.4);backdrop-filter:blur(8px)}
.final.on{display:flex}
.f-card{background:var(--white);border-radius:var(--r-lg);padding:44px;max-width:460px;text-align:center;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.f-card h2{font-size:1.3rem;font-weight:700;margin-bottom:8px;color:var(--ink)}
.f-card p{color:var(--t2);font-size:13px;line-height:1.7;margin-bottom:20px}

@media(max-width:800px){.h-grid{grid-template-columns:1fr 1fr}.tip{max-width:320px}}
@media(max-width:500px){.h-grid{grid-template-columns:1fr}}
</style>
</head>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let cur=null,step=0,done=new Set();

function renderHome(){
  const g=document.getElementById('grid');g.innerHTML='';
  SCENARIOS.forEach((s,i)=>{
    const c=document.createElement('div');
    c.className='h-card'+(done.has(s.id)?' done':'');
    c.innerHTML=`<div class="h-num">${i+1}</div><h3>${s.icon} ${s.title}</h3><p>${s.desc}</p><div class="h-steps">${s.steps.length} étapes</div>`;
    c.onclick=()=>startScenario(s);
    g.appendChild(c);
  });
}

function startScenario(s){
  cur=s;step=0;
  document.getElementById('home').classList.add('out');
  document.getElementById('final').classList.remove('on');
  document.getElementById('app').classList.add('on');
  document.getElementById('topTitle').textContent=s.icon+' '+s.title;
  const dots=document.getElementById('topDots');dots.innerHTML='';
  s.steps.forEach((_,i)=>{const d=document.createElement('div');d.className='t-dot';dots.appendChild(d)});
  show(0);
}

function show(idx){
  if(!cur||idx<0||idx>=cur.steps.length)return;
  step=idx;const s=cur.steps[idx];

  // Image
  const img=document.getElementById('img');
  const prevSrc=img.getAttribute('data-src');
  if(prevSrc!==s.img){img.classList.add('fade');img.setAttribute('data-src',s.img);setTimeout(()=>{img.src=s.img;img.onload=()=>img.classList.remove('fade');if(img.complete)img.classList.remove('fade')},120)}

  // Top dots
  document.querySelectorAll('.t-dot').forEach((d,i)=>{d.classList.toggle('done',i<idx);d.classList.toggle('cur',i===idx)});
  document.getElementById('topCount').textContent=(idx+1)+'/'+cur.steps.length;

  // Ring
  const ring=document.getElementById('ring');
  const content=document.getElementById('content');
  const dim=document.getElementById('dim');
  if(s.rw&&s.rh){
    dim.classList.add('on');
    setTimeout(()=>{
      const ir=img.getBoundingClientRect();const cr=content.getBoundingClientRect();
      const ox=ir.left-cr.left,oy=ir.top-cr.top;
      ring.style.left=(ox+ir.width*(s.x-s.rw/2)/100)+'px';
      ring.style.top=(oy+ir.height*(s.y-s.rh/2)/100)+'px';
      ring.style.width=(ir.width*s.rw/100)+'px';
      ring.style.height=(ir.height*s.rh/100)+'px';
      ring.style.display='block';
    },180);
  }else{ring.style.display='none';dim.classList.remove('on')}

  // Tip
  const tip=document.getElementById('tip');
  document.getElementById('tipNum').textContent='ÉTAPE '+(idx+1)+'/'+cur.steps.length;
  document.getElementById('tipLabel').textContent=cur.title;
  document.getElementById('tipTitle').textContent=s.title;
  document.getElementById('tipText').innerHTML=s.text.replace(/\n/g,'<br>');
  const hl=document.getElementById('tipHl');
  if(s.hl){hl.innerHTML='💡 '+s.hl;hl.style.display='block'}else{hl.style.display='none'}
  document.getElementById('tipMid').textContent=(idx+1)+' / '+cur.steps.length;
  document.getElementById('btnPrev').style.display=idx===0?'none':'';
  const nb=document.getElementById('btnNext');nb.textContent=idx===cur.steps.length-1?'Terminer ✓':'Suivant →';

  // Position tip smartly
  const cr=content.getBoundingClientRect();
  const tw=Math.min(400,cr.width*.4);
  tip.style.maxWidth=tw+'px';
  const tx=s.x>55?5:(s.x<45?58:50);
  const ty=Math.max(3,Math.min(s.y-8,55));
  tip.style.left=(cr.width*tx/100)+'px';
  tip.style.top=(cr.height*ty/100)+'px';
  tip.classList.add('on');

  // Bottom dots
  const bb=document.getElementById('bbDots');bb.innerHTML='';
  cur.steps.forEach((_,i)=>{const d=document.createElement('div');d.className='bb-d'+(i<idx?' done':'')+(i===idx?' cur':'');bb.appendChild(d)});
  document.getElementById('bbInfo').innerHTML='<strong>'+cur.icon+' '+cur.title+'</strong> · Étape '+(idx+1)+'/'+cur.steps.length;
}

function next(){
  if(!cur)return;
  if(step<cur.steps.length-1){show(step+1)}
  else{
    done.add(cur.id);
    document.getElementById('app').classList.remove('on');
    document.getElementById('tip').classList.remove('on');
    document.getElementById('ring').style.display='none';
    document.getElementById('dim').classList.remove('on');
    document.getElementById('fIcon').textContent=cur.fIcon;
    document.getElementById('fTitle').textContent=done.size>=SCENARIOS.length?'Tous les scénarios terminés ! 🎉':cur.fTitle;
    document.getElementById('fText').textContent=done.size>=SCENARIOS.length?'Vous maîtrisez Cleo Insight. Connectez-vous et commencez votre veille réglementaire.':cur.fText;
    document.getElementById('final').classList.add('on');
  }
}
function prev(){if(step>0)show(step-1)}
function goHome(){
  document.getElementById('app').classList.remove('on');
  document.getElementById('final').classList.remove('on');
  document.getElementById('tip').classList.remove('on');
  document.getElementById('ring').style.display='none';
  document.getElementById('dim').classList.remove('on');
  renderHome();
  document.getElementById('home').classList.remove('out');
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
  if(e.key==='ArrowLeft'){e.preventDefault();prev()}
  if(e.key==='Escape')goHome();
});

renderHome();
</script>
